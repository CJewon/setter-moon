name: Vercel Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production
      ref:
        description: "Optional branch, tag, or SHA to deploy"
        type: string
        required: false
      run_smoke:
        description: "Run deploy smoke test after deployment"
        type: boolean
        required: true
        default: false

concurrency:
  group: vercel-${{ inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve Vercel target
        id: target
        shell: bash
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build with Vercel
        run: vercel build ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        id: deploy
        shell: bash
        run: |
          deployment_url=$(vercel deploy --prebuilt ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ inputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Install Chrome for smoke test
        if: ${{ inputs.run_smoke }}
        run: npm --workspace front exec playwright install chrome

      - name: Deploy smoke test
        if: ${{ inputs.run_smoke }}
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.deployment_url }}
          E2E_SELLER_EMAIL: ${{ secrets.E2E_SELLER_EMAIL }}
          E2E_SELLER_PASSWORD: ${{ secrets.E2E_SELLER_PASSWORD }}
        run: npm --workspace front run test:e2e -- --project=chrome e2e/deploy-smoke.spec.ts
