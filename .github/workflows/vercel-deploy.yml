name: Vercel Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production
      run_smoke:
        description: "Run deploy smoke test after deployment"
        type: boolean
        required: true
        default: false

concurrency:
  group: vercel-${{ inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.target.outputs.environment }}
      prod_flag: ${{ steps.target.outputs.prod_flag }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate Vercel secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error title=Missing GitHub Secret::VERCEL_TOKEN is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Secrets."
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error title=Missing Vercel Project Value::VERCEL_ORG_ID is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Variables, or add it as a repository secret."
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error title=Missing Vercel Project Value::VERCEL_PROJECT_ID is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Variables, or add it as a repository secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve Vercel target
        id: target
        shell: bash
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token="$VERCEL_TOKEN"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build with Vercel
        run: vercel build ${{ steps.target.outputs.prod_flag }} --token="$VERCEL_TOKEN"

      - name: Validate prebuilt function config
        shell: bash
        run: |
          if ! find .vercel/output/functions -name .vc-config.json -print -quit | grep -q .; then
            echo "::error title=Missing Vercel Function Config::No .vc-config.json files were found in .vercel/output/functions."
            exit 1
          fi

      - name: Upload prebuilt output
        uses: actions/upload-artifact@v4
        with:
          name: vercel-prebuilt-${{ inputs.target }}
          path: |
            .vercel/output
            .vercel/project.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error title=Missing GitHub Secret::VERCEL_TOKEN is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Secrets."
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error title=Missing Vercel Project Value::VERCEL_ORG_ID is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Variables, or add it as a repository secret."
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error title=Missing Vercel Project Value::VERCEL_PROJECT_ID is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Variables, or add it as a repository secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Download prebuilt output
        uses: actions/download-artifact@v4
        with:
          name: vercel-prebuilt-${{ inputs.target }}
          path: .vercel

      - name: Validate downloaded function config
        shell: bash
        run: |
          if ! find .vercel/output/functions -name .vc-config.json -print -quit | grep -q .; then
            echo "::error title=Missing Vercel Function Config::The downloaded prebuilt artifact does not contain .vc-config.json files."
            exit 1
          fi

      - name: Deploy prebuilt output
        id: deploy
        shell: bash
        run: |
          deployment_url=$(vercel deploy --prebuilt ${{ needs.build.outputs.prod_flag }} --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ inputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for smoke test
        run: npm --workspace front exec playwright install chrome

      - name: Validate smoke test secrets
        shell: bash
        env:
          E2E_SELLER_EMAIL: ${{ secrets.E2E_SELLER_EMAIL }}
          E2E_SELLER_PASSWORD: ${{ secrets.E2E_SELLER_PASSWORD }}
        run: |
          missing=0
          for name in E2E_SELLER_EMAIL E2E_SELLER_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub Secret::$name is not set. Add it in GitHub repository Settings > Secrets and variables > Actions, or run the workflow with run_smoke=false."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy smoke test
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.deployment_url }}
          E2E_SELLER_EMAIL: ${{ secrets.E2E_SELLER_EMAIL }}
          E2E_SELLER_PASSWORD: ${{ secrets.E2E_SELLER_PASSWORD }}
        run: npm --workspace front run test:e2e -- --project=chrome e2e/deploy-smoke.spec.ts
