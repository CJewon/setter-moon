name: Vercel Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production
      run_smoke:
        description: "Run deploy smoke test after deployment"
        type: boolean
        required: true
        default: false

concurrency:
  group: vercel-${{ inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate Vercel secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error title=Missing GitHub Secret::VERCEL_TOKEN is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Secrets."
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error title=Missing Vercel Project Value::VERCEL_ORG_ID is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Variables, or add it as a repository secret."
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error title=Missing Vercel Project Value::VERCEL_PROJECT_ID is not set. Add it in GitHub repository Settings > Secrets and variables > Actions > Variables, or add it as a repository secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve Vercel target
        id: target
        shell: bash
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate GitHub application environment
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          required_keys=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SERVICE_ROLE_KEY
          )

          missing=0
          for key in "${required_keys[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing GitHub App Environment::$key is empty. Add it in GitHub repository Settings > Secrets and variables > Actions."
              missing=1
            fi
          done

          if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [[ "$NEXT_PUBLIC_SUPABASE_URL" != https://*.supabase.co ]]; then
            echo "::error title=Invalid Supabase URL::NEXT_PUBLIC_SUPABASE_URL must be a full https://<project-ref>.supabase.co URL."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "::add-mask::$NEXT_PUBLIC_SUPABASE_URL"
          echo "::add-mask::$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"

      - name: Sync Vercel application environment
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          echo "::add-mask::$NEXT_PUBLIC_SUPABASE_URL"
          echo "::add-mask::$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"

          sync_env() {
            local key="$1"
            local value="$2"
            shift 2

            printf '%s' "$value" | vercel env add "$key" "${{ steps.target.outputs.environment }}" --force --yes "$@" --token="$VERCEL_TOKEN" > /dev/null
          }

          sync_env NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL"
          sync_env NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          sync_env SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY" --sensitive

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token="$VERCEL_TOKEN"

      - name: Remove local application environment cache
        shell: bash
        run: |
          set -euo pipefail

          env_file=".vercel/.env.${{ steps.target.outputs.environment }}.local"
          if [ ! -f "$env_file" ]; then
            echo "::error title=Missing Vercel Env File::$env_file was not created by vercel pull."
            exit 1
          fi

          for key in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY SUPABASE_SERVICE_ROLE_KEY; do
            sed -i "/^${key}=/d" "$env_file"
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build with Vercel
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: vercel build ${{ steps.target.outputs.prod_flag }} --token="$VERCEL_TOKEN"

      - name: Validate prebuilt function config
        shell: bash
        run: |
          if ! find .vercel/output/functions -name .vc-config.json -print -quit | grep -q .; then
            echo "::error title=Missing Vercel Function Config::No .vc-config.json files were found in .vercel/output/functions."
            exit 1
          fi

      - name: Validate Next build output
        shell: bash
        run: |
          if [ ! -f front/.next/package.json ]; then
            echo "::error title=Missing Next Build Output::front/.next/package.json was not created by vercel build."
            exit 1
          fi

      - name: Deploy prebuilt output
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          deployment_url=$(
            vercel deploy --prebuilt ${{ steps.target.outputs.prod_flag }} --archive=tgz --token="$VERCEL_TOKEN"
          )
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ inputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ inputs.run_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for smoke test
        run: npm --workspace front exec playwright install chrome

      - name: Validate smoke test secrets
        shell: bash
        env:
          E2E_SELLER_EMAIL: ${{ secrets.E2E_SELLER_EMAIL }}
          E2E_SELLER_PASSWORD: ${{ secrets.E2E_SELLER_PASSWORD }}
        run: |
          missing=0
          for name in E2E_SELLER_EMAIL E2E_SELLER_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub Secret::$name is not set. Add it in GitHub repository Settings > Secrets and variables > Actions, or run the workflow with run_smoke=false."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy smoke test
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.deployment_url }}
          E2E_SELLER_EMAIL: ${{ secrets.E2E_SELLER_EMAIL }}
          E2E_SELLER_PASSWORD: ${{ secrets.E2E_SELLER_PASSWORD }}
          E2E_VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm --workspace front run test:e2e -- --project=chrome e2e/deploy-smoke.spec.ts
